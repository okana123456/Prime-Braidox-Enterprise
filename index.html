<style>
:root{
  --bg:#f4f6fa; --surface:#ffffff; --surface-2:#f9fafc; --border:#e3e7ee;
  --text:#0d1b2a; --text-muted:#5a6478; --text-subtle:#8a93a6;
  --primary:#0b1f3a; --primary-700:#13325c; --primary-50:#eaf0fb;
  --accent:#1f6feb; --accent-50:#e7f0ff;
  --success:#137a3f; --success-50:#e6f5ec;
  --warning:#9a6700; --warning-50:#fff5db;
  --danger:#a4262c; --danger-50:#fbeaea;
  --info:#1d5e8a; --info-50:#e6f1f8;
  --radius:8px; --radius-sm:6px; --radius-lg:12px;
  --shadow-sm:0 1px 2px rgba(13,27,42,.06), 0 1px 1px rgba(13,27,42,.04);
  --shadow-md:0 4px 12px rgba(13,27,42,.08);
  --shadow-lg:0 14px 40px rgba(13,27,42,.18);
  --sidebar-w:248px;
  --header-h:56px;
}
body.dark{
  --bg:#0a1422; --surface:#10203a; --surface-2:#0d1a30; --border:#1d3157;
  --text:#e6ecf5; --text-muted:#9aa7bd; --text-subtle:#6c7a92;
  --primary:#1f6feb; --primary-700:#3b85ff; --primary-50:#142a4a;
  --accent:#3b85ff; --accent-50:#142a4a;
  --success-50:#0f2a1c; --warning-50:#2a2208; --danger-50:#2a1212; --info-50:#0f2333;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
button{font-family:inherit;cursor:pointer}
a{color:var(--accent);text-decoration:none}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-50)}
input[disabled],select[disabled]{background:var(--surface-2);color:var(--text-muted)}
label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px;letter-spacing:.01em}
.field{margin-bottom:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid transparent;background:var(--surface);color:var(--text);font-weight:600;font-size:13px;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface-2)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-700)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{filter:brightness(1.08)}
.btn-outline{background:transparent;border-color:var(--border);color:var(--text)}
.btn-outline:hover{background:var(--surface-2);border-color:var(--text-muted)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-ghost{background:transparent;border:none;color:var(--text-muted);padding:6px 10px}
.btn-ghost:hover{background:var(--surface-2);color:var(--text)}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-block{width:100%}

/* Layout */
#app{min-height:100vh}
.auth-shell{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(135deg,var(--primary) 0%,#091a30 100%)}
.auth-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:36px 32px;width:100%;max-width:420px}
.auth-brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.auth-brand .mark{width:36px;height:36px;border-radius:8px;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px;letter-spacing:.5px}
.auth-brand h1{margin:0;font-size:17px;font-weight:700;letter-spacing:-.01em}
.auth-sub{color:var(--text-muted);font-size:13px;margin-bottom:22px}
.auth-sep{margin:18px 0;border-top:1px solid var(--border);position:relative;text-align:center}
.auth-sep span{position:relative;top:-9px;background:var(--surface);padding:0 10px;font-size:11px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:.08em}
.auth-error{background:var(--danger-50);color:var(--danger);border:1px solid var(--danger);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;margin-bottom:14px}
.auth-info{background:var(--info-50);color:var(--info);border:1px solid var(--info);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;margin-bottom:14px}

.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--primary);color:#cbd6e8;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:40;transition:transform .25s ease}
.sidebar .brand{height:var(--header-h);display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar .brand .mark{width:30px;height:30px;border-radius:7px;background:#fff;color:var(--primary);display:grid;place-items:center;font-weight:800;font-size:12px}
.sidebar .brand .title{color:#fff;font-weight:700;font-size:14px;letter-spacing:-.01em}
.sidebar .brand .sub{color:#7e92b4;font-size:11px;margin-top:1px}
.nav{flex:1;overflow-y:auto;padding:14px 10px}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#6e83a7;padding:14px 10px 6px}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);color:#cbd6e8;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,color .15s}
.nav a:hover{background:rgba(255,255,255,.05);color:#fff}
.nav a.active{background:rgba(255,255,255,.10);color:#fff}
.nav a .icn{width:16px;height:16px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:#9bb0d3}
.nav a.active .icn{color:#fff}
.sidebar-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.07);font-size:12px;color:#8a9dbe}

.main{flex:1;margin-left:var(--sidebar-w);display:flex;flex-direction:column;min-width:0}
.topbar{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:14px;position:sticky;top:0;z-index:30}
.topbar .menu-btn{display:none;background:none;border:none;padding:6px;color:var(--text)}
.topbar h2{margin:0;font-size:15px;font-weight:600;color:var(--text);flex:1;letter-spacing:-.01em}
.topbar .user{display:flex;align-items:center;gap:10px}
.topbar .user .av{width:30px;height:30px;border-radius:50%;background:var(--primary-50);color:var(--primary);display:grid;place-items:center;font-weight:700;font-size:12px}
.topbar .user .name{font-size:13px;font-weight:600;line-height:1.2}
.topbar .user .role{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}

.content{flex:1;padding:22px 26px 80px;max-width:100%;overflow-x:hidden}
@media(max-width:1024px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-lg)}
  .main{margin-left:0}
  .topbar .menu-btn{display:inline-flex}
  .content{padding:16px 14px 96px}
}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
.scrim.show{display:block}

/* Page chrome */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.page-head h1{margin:0 0 4px;font-size:22px;font-weight:700;letter-spacing:-.015em}
.page-head .desc{color:var(--text-muted);font-size:13px}
.page-head .actions{display:flex;gap:8px;flex-wrap:wrap}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm)}
.card-pad{padding:20px}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-head h3{margin:0;font-size:14px;font-weight:700;letter-spacing:-.005em}
.card-head .sub{font-size:12px;color:var(--text-muted)}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:var(--accent)}
.kpi.k-success::before{background:var(--success)}
.kpi.k-warn::before{background:var(--warning)}
.kpi.k-danger::before{background:var(--danger)}
.kpi.k-primary::before{background:var(--primary)}
.kpi .l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);font-weight:600}
.kpi .v{font-size:24px;font-weight:700;margin-top:6px;letter-spacing:-.02em}
.kpi .d{font-size:12px;color:var(--text-muted);margin-top:3px}

/* Tables */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface)}
table.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
.tbl thead th{text-align:left;padding:11px 14px;background:var(--surface-2);color:var(--text-muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl tbody td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:var(--surface-2)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.01em;border:1px solid transparent}
.b-green{background:var(--success-50);color:var(--success);border-color:var(--success)}
.b-red{background:var(--danger-50);color:var(--danger);border-color:var(--danger)}
.b-yellow{background:var(--warning-50);color:var(--warning);border-color:var(--warning)}
.b-blue{background:var(--accent-50);color:var(--accent);border-color:var(--accent)}
.b-grey{background:var(--surface-2);color:var(--text-muted);border-color:var(--border)}
.b-info{background:var(--info-50);color:var(--info);border-color:var(--info)}

/* Modal */
.modal-back{position:fixed;inset:0;background:rgba(13,27,42,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:50;overflow-y:auto}
.modal-back.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:520px;max-height:92vh;display:flex;flex-direction:column}
.modal.lg{max-width:780px}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{margin:0;font-size:15px;font-weight:700;letter-spacing:-.01em}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.x-btn{background:none;border:none;color:var(--text-muted);font-size:20px;line-height:1;padding:4px;cursor:pointer}
.x-btn:hover{color:var(--text)}

/* Stepper */
.stepper{display:flex;justify-content:space-between;margin-bottom:22px;gap:8px}
.step{flex:1;text-align:center;padding:9px 6px;border-radius:var(--radius-sm);background:var(--surface-2);font-size:12px;color:var(--text-muted);font-weight:600;border:1px solid var(--border);position:relative}
.step.done{background:var(--success-50);color:var(--success);border-color:var(--success)}
.step.current{background:var(--primary);color:#fff;border-color:var(--primary)}
.step .n{display:inline-block;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.2);font-size:10px;line-height:18px;margin-right:6px;font-weight:700}
.step.current .n{background:rgba(255,255,255,.25)}
@media(max-width:600px){.step .lbl{display:none}.step{padding:8px 4px}.step .n{margin-right:0}}

/* Toolbar */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.toolbar .grow{flex:1;min-width:200px}
.search-box{position:relative}
.search-box input{padding-left:34px}
.search-box .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}

/* Action menu (fixed positioning to avoid clipping) */
.act-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 9px;color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:600}
.act-btn:hover{color:var(--text);border-color:var(--text-muted)}
.act-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);z-index:100;min-width:180px;padding:5px;display:none}
.act-menu.show{display:block}
.act-menu button{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:8px 11px;background:none;border:none;border-radius:var(--radius-sm);color:var(--text);font-size:13px;cursor:pointer}
.act-menu button:hover{background:var(--surface-2)}
.act-menu button.danger{color:var(--danger)}
.act-menu .sep{height:1px;background:var(--border);margin:4px 0}

/* Empty / loading */
.empty{padding:50px 20px;text-align:center;color:var(--text-muted)}
.empty h4{margin:0 0 6px;color:var(--text);font-weight:600}
.empty p{margin:0;font-size:13px;max-width:380px;margin:0 auto}

.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast-stack{position:fixed;top:14px;right:14px;display:flex;flex-direction:column;gap:8px;z-index:200;max-width:340px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);padding:10px 14px;font-size:13px;animation:slideIn .2s ease}
.toast.success{border-left-color:var(--success)}
.toast.error{border-left-color:var(--danger)}
.toast.warn{border-left-color:var(--warning)}
.toast .t{font-weight:600;margin-bottom:2px}
.toast .m{color:var(--text-muted);font-size:12px}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* Bottom nav (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:25;padding:5px 0 max(5px,env(safe-area-inset-bottom));justify-content:space-around}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;color:var(--text-muted);font-size:10px;font-weight:600;cursor:pointer;border-radius:var(--radius-sm);min-width:54px}
.bottom-nav a.active{color:var(--accent)}
@media(max-width:768px){.bottom-nav{display:flex}.content{padding-bottom:84px}}

/* Status banner */
.status-banner{position:fixed;top:0;left:0;right:0;background:var(--warning);color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:600;z-index:300;display:none}
.status-banner.show{display:block}
.status-banner.online{background:var(--success)}

/* Member meeting card */
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px}
.mc .top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mc .av{width:36px;height:36px;border-radius:50%;background:var(--primary-50);color:var(--primary);display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0}
.mc .nm{font-weight:600;font-size:14px}
.mc .meta{font-size:11px;color:var(--text-muted);margin-top:1px}
.mc .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mc .row.three{grid-template-columns:1fr 1fr 1fr}
@media(max-width:480px){.mc .row.three{grid-template-columns:1fr 1fr}}
.mc .ro{background:var(--surface-2);padding:7px 10px;border-radius:var(--radius-sm);font-size:11px;color:var(--text-muted)}
.mc .ro b{display:block;font-size:13px;color:var(--text);font-weight:700;margin-top:1px}
.mc .absent-row{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--text-muted)}

/* Misc */
.kbd{display:inline-block;padding:1px 6px;font-size:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:4px;color:var(--text-muted);font-family:'SF Mono',Menlo,Consolas,monospace}
.divider{height:1px;background:var(--border);margin:18px 0}
.helper{font-size:11px;color:var(--text-muted);margin-top:4px}
.danger-text{color:var(--danger)}
.success-text{color:var(--success)}
.muted{color:var(--text-muted)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;gap:2px;overflow-x:auto}
.tabs button{background:none;border:none;padding:10px 14px;color:var(--text-muted);font-weight:600;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
.checkbox-row{display:flex;align-items:center;gap:8px}
.checkbox-row input{width:auto}
.summary-table{width:100%;font-size:13px}
.summary-table td{padding:6px 0}
.summary-table td:first-child{color:var(--text-muted);width:45%}
.summary-table td:last-child{font-weight:600;text-align:right}
.summary-table h5{margin:14px 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-subtle)}
</style>
</head>
<body>

<div id="status-banner" class="status-banner"></div>
<div id="toast-stack" class="toast-stack"></div>
<div id="app"></div>
<div id="modal-root"></div>
<div id="actmenu-root"></div>

<script>
/* =====================================================================
 * PRIME BRAIDOX ENTERPRISE
 * Single-file production application.

/* ----- Storage helpers (business-scoped, quota-safe) ----- */
const sk = k => `pb_${BIZ_ID}_${k}`;
function lsGet(k, d=null){ try{ const v = localStorage.getItem(sk(k)); return v?JSON.parse(v):d; }catch{ return d; } }
function lsSet(k, v){
  try{ localStorage.setItem(sk(k), JSON.stringify(v)); return true; }
  catch(e){
    if(e.name === 'QuotaExceededError'){
      const keys = Object.keys(localStorage).filter(x=>x.startsWith(`pb_${BIZ_ID}_`));
      keys.sort().slice(0, Math.ceil(keys.length*0.2)).forEach(x=>localStorage.removeItem(x));
      try{ localStorage.setItem(sk(k), JSON.stringify(v)); return true; }catch{ return false; }
    }
    return false;
  }
}
function lsDel(k){ localStorage.removeItem(sk(k)); }

/* ----- Crypto / hash for offline auth ----- */
async function sha256(s){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ----- Offline write queue ----- */
async function queuedInsert(table, row){
  if(navigator.onLine){
    const { error } = await sb.from(table).insert(row);
    if(!error) return { ok:true };
    // fall through to queue on network failures
  }
  const q = lsGet('queue', []);
  q.push({ table, row, t: Date.now() });
  lsSet('queue', q);
  return { ok:true, queued:true };
}
async function flushQueue(){
  const q = lsGet('queue', []);
  if(!q.length) return;
  const remaining = [];
  for(const item of q){
    const { error } = await sb.from(item.table).insert(item.row);
    if(error) remaining.push(item);
  }
  lsSet('queue', remaining);
  if(q.length && !remaining.length) toast('Queued changes synchronised.', 'success');
}

/* =====================================================================
 * AUTH
 * ===================================================================== */
async function signIn(email, password){
  email = email.trim().toLowerCase();
  if(!navigator.onLine){
    const cache = lsGet('auth_cache', {});
    const h = await sha256(password);
    const rec = cache[email];
    if(rec && rec.h === h){
      state.session = { user: { id: rec.auth_user_id, email } };
      state.staff = rec.staff;
      state.perms = rec.perms;
      await afterLogin(true);
      return { ok:true, offline:true };
    }
    return { ok:false, error:'No internet connection and no cached credentials for this account.' };
  }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error) return { ok:false, error: error.message };
  state.session = data.session;
  const ok = await loadStaff();
  if(!ok){
    await sb.auth.signOut();
    state.session = null;
    return { ok:false, error:'Your authentication account exists but is not provisioned in the staff registry. Please contact your administrator.' };
  }
  // Cache for offline use
  const cache = lsGet('auth_cache', {});
  cache[email] = {
    h: await sha256(password),
    auth_user_id: data.session.user.id,
    staff: state.staff, perms: state.perms
  };
  lsSet('auth_cache', cache);
  await afterLogin(false);
  return { ok:true };
}

async function loadStaff(){
  const uid = state.session.user.id;
  const { data, error } = await sb.from('pb_staff').select('*').eq('auth_user_id', uid).maybeSingle();
  if(error || !data) return false;
  if(data.status !== 'active') return false;
  state.staff = data;
  if(data.business_id){ BIZ_ID = 'biz_' + data.business_id; }
  const { data: perms } = await sb.from('pb_permissions').select('*').eq('staff_id', data.id).maybeSingle();
  state.perms = perms || {};
  return true;
}

/* =====================================================================
 * BUSINESS REGISTRATION (signup with master key)
 * ===================================================================== */
async function registerBusiness({ businessName, adminName, email, password, key }){
  if(key !== BUSINESS_REGISTRATION_KEY){
    return { ok:false, error:'Invalid business registration key. Contact Prime Braidox to obtain a valid key.' };
  }
  if(!navigator.onLine) return { ok:false, error:'An internet connection is required to register a new business.' };
  email = email.trim().toLowerCase();

  let userId = null;
  let session = null;

  // 1. Create the authentication user. If a previous attempt already created
  //    the auth account, sign in and complete the missing staff provisioning.
  const { data: authData, error: authErr } = await sb.auth.signUp({
    email, password,
    options: {
      emailRedirectTo: authRedirectUrl(),
      data: { full_name: adminName, business_name: businessName }
    }
  });

  if(authErr){
    const msg = authErr.message || '';
    if(/already|registered|exists/i.test(msg)){
      const { data: loginData, error: loginErr } = await sb.auth.signInWithPassword({ email, password });
      if(loginErr){
        return { ok:false, error:'This email already has an authentication account. If you have already received the confirmation email, click Confirm email first, then return here and press Register business again with the same email, password and registration key.' };
      }
      userId = loginData.user?.id || loginData.session?.user?.id;
      session = loginData.session || null;
    } else {
      return { ok:false, error: msg };
    }
  } else {
    userId = authData.user?.id;
    session = authData.session || null;
  }

  if(!userId) return { ok:false, error:'Authentication account could not be created.' };

  // 2. Provision business, admin staff registry, permissions and settings in one
  //    server-side database call, so email confirmation cannot leave the account
  //    without a matching staff registry row.
  const { error: provisionErr } = await sb.rpc('pb_register_business_admin', {
    p_auth_user_id: userId,
    p_business_name: businessName,
    p_admin_name: adminName,
    p_admin_email: email,
    p_registration_key: key
  });
  if(provisionErr) return { ok:false, error:'Business provisioning failed: ' + provisionErr.message };

  if(session){
    state.session = session;
    const ok = await loadStaff();
    if(ok){ await afterLogin(false); return { ok:true, signedIn:true }; }
  }

  return { ok:true, requiresEmailConfirmation: !session };
}

/* ----- Session token refresh guard ----- */
async function ensureFreshToken(){
  try {
    const { data, error } = await sb.auth.refreshSession();
    if(error || !data.session){
      toast('Your session has expired. Please sign in again.', 'error');
      await signOut();
      return false;
    }
    state.session = data.session;
    return true;
  } catch(e) {

    await signOut();
    return false;
  }
}

async function smartLoadAll(){
  // Refresh the token before bulk fetching to avoid 401s on expired sessions
  if(navigator.onLine){
    const { data: sessionData, error: sessionErr } = await sb.auth.getSession();
    if(sessionErr || !sessionData.session){
      toast('Session expired. Please sign in again.', 'error');
      await sb.auth.signOut();
      state.session = null; state.staff = null; state.perms = null;
      render(); return;
    }
    const exp = sessionData.session.expires_at;
    if(exp && (exp - Math.floor(Date.now()/1000)) < 600){
      const { data: refreshed, error: refreshErr } = await sb.auth.refreshSession();
      if(!refreshErr && refreshed.session) state.session = refreshed.session;
    }
  }
  state.loading = true; render();
  const tables = ['pb_groups','pb_members','pb_guarantors','pb_staff','pb_inventory','pb_loans','pb_orders','pb_savings','pb_repayments','pb_meetings','pb_suppliers','pb_purchases','pb_purchase_lines','pb_reconciliations'];
  const map = { pb_groups:'groups', pb_members:'members', pb_guarantors:'guarantors', pb_staff:'staff', pb_inventory:'inventory', pb_loans:'loans', pb_orders:'orders', pb_savings:'savings', pb_repayments:'repayments', pb_meetings:'meetings', pb_suppliers:'suppliers', pb_purchases:'purchases', pb_purchase_lines:'purchaseLines', pb_reconciliations:'reconciliations' };
  const results = await Promise.all(tables.map(t => sb.from(t).select('*').limit(5000)));
  let jwtBroken = false;
  results.forEach((r,i) => {
    if(!r.error){
      state.data[map[tables[i]]] = r.data || [];
      lsSet(map[tables[i]], r.data || []);
    } else {
      if(!jwtBroken && r.error.message && /jwt|unauthorized|401/i.test(r.error.message)){
        jwtBroken = true;
        toast('Authentication error loading data. Please sign in again.', 'error');
        sb.auth.signOut().then(()=>{ state.session=null; state.staff=null; state.perms=null; render(); });
      }
      state.data[map[tables[i]]] = lsGet(map[tables[i]], []);
    }
  });
  if(!jwtBroken) state.loading = false;
}

/* ----- Realtime ----- */
let rtChan = null;
function setupRealtime(){
  if(rtChan) sb.removeChannel(rtChan);
  rtChan = sb.channel('pb_changes')
    .on('postgres_changes', { event:'*', schema:'public' }, payload => {
      const tbl = payload.table;
      const map = { pb_groups:'groups', pb_members:'members', pb_guarantors:'guarantors', pb_inventory:'inventory', pb_loans:'loans', pb_orders:'orders', pb_savings:'savings', pb_repayments:'repayments', pb_meetings:'meetings', pb_suppliers:'suppliers', pb_staff:'staff', pb_purchases:'purchases', pb_purchase_lines:'purchaseLines', pb_reconciliations:'reconciliations' };
      const key = map[tbl]; if(!key) return;
      const arr = state.data[key];
      if(payload.eventType === 'INSERT'){ if(!arr.find(x=>x.id===payload.new.id)) arr.unshift(payload.new); }
      else if(payload.eventType === 'UPDATE'){ const i = arr.findIndex(x=>x.id===payload.new.id); if(i>=0) arr[i] = payload.new; }
      else if(payload.eventType === 'DELETE'){ const i = arr.findIndex(x=>x.id===payload.old.id); if(i>=0) arr.splice(i,1); }
      lsSet(key, arr);
      if(['dashboard','members','groups','meeting','loans','inventory'].includes(state.view)) render();
    })
    .subscribe();
}

function modal({ title, body, actions=[], size='' }){
  const root = $('modal-root');
  root.innerHTML = `
    <div class="modal-back show" id="modal-back">
      <div class="modal ${size}">
        <div class="modal-head"><h3>${title}</h3><button class="x-btn" onclick="closeModal()">×</button></div>
        <div class="modal-body">${body}</div>
        ${actions.length ? `<div class="modal-foot">${actions.map((a,i)=>`<button class="btn ${a.cls||'btn-outline'}" data-act="${i}">${a.label}</button>`).join('')}</div>` : ''}
      </div>
    </div>`;
  actions.forEach((a,i) => {
    root.querySelector(`[data-act="${i}"]`).addEventListener('click', () => a.onClick && a.onClick());
  });
}
function closeModal(){ $('modal-root').innerHTML = ''; }
function confirmDialog(message, onYes, { title='Confirm', danger=false } = {}){
  modal({
    title,
    body: `<p style="margin:0;color:var(--text)">${message}</p>`,
    actions: [
      { label:'Cancel', cls:'btn-outline', onClick: closeModal },
      { label: danger?'Delete':'Confirm', cls: danger?'btn-danger':'btn-primary', onClick: ()=>{ closeModal(); onYes(); } }
    ]
  });
}

function showActMenu(ev, items){
  const root = $('actmenu-root');
  root.innerHTML = `<div class="act-menu show" id="act-menu">
    ${items.map((it,i) => it === 'sep'
      ? `<div class="sep"></div>`
      : `<button class="${it.danger?'danger':''}" data-i="${i}">${it.label}</button>`).join('')}
  </div>`;
  const m = $('act-menu');
  const r = ev.currentTarget.getBoundingClientRect();
  m.style.top = Math.min(r.bottom + 4, window.innerHeight - m.offsetHeight - 10) + 'px';
  m.style.left = Math.min(r.left, window.innerWidth - m.offsetWidth - 10) + 'px';
  items.forEach((it,i) => {
    if(it==='sep') return;
    m.querySelector(`[data-i="${i}"]`).addEventListener('click', ()=>{ root.innerHTML=''; it.onClick(); });
  });
  setTimeout(() => document.addEventListener('click', closeActMenu, { once:true }), 0);
}

let _dashFilter = 'today';
let _dashCustomStart = '', _dashCustomEnd = '';

function dashDateRange(){
  const now = new Date();
  const iso = d => d.toISOString().slice(0,10);
  const today = iso(now);
  if(_dashFilter==='today') return { start: today, end: today };
  if(_dashFilter==='yesterday'){
    const y = new Date(now); y.setDate(y.getDate()-1); const yd = iso(y);
    return { start: yd, end: yd };
  }
  if(_dashFilter==='week'){
    const d = new Date(now); d.setDate(d.getDate()-6);
    return { start: iso(d), end: today };
  }
  if(_dashFilter==='month'){
    const d = new Date(now); d.setMonth(d.getMonth()-1);
    return { start: iso(d), end: today };
  }
  if(_dashFilter==='3months'){
    const d = new Date(now); d.setMonth(d.getMonth()-3);
    return { start: iso(d), end: today };
  }
  if(_dashFilter==='custom'){
    return { start: _dashCustomStart||today, end: _dashCustomEnd||today };
  }
  return { start: today, end: today };
}

/* ----- Member registration wizard (4 steps) ----- */
function openMemberWizard(){
  state._wizardStep = 1;
  state._wizardData = {
    full_name:'', national_id:'', date_of_birth:'', gender:'Male', phone:'', email:'',
    address:'', nearest_town:'', occupation:'', employer:'', income_estimate:'',
    group_id:'', registered_on: todayISO(), officer_id:'',
    registration_fee: state.settings?.registration_fee || 200,
    guarantors:[ { full_name:'', national_id:'', phone:'', location:'', relationship:'' } ]
  };
  renderWizard();
}
function renderWizard(){
  const s = state._wizardStep;
  const d = state._wizardData;
  const stepLabels = ['Personal details','Group assignment','Guarantor details','Review & confirm'];
  modal({
    title: 'Register member',
    size:'lg',
    body: `
      <div class="stepper">
        ${stepLabels.map((l,i) => {
          const n = i+1;
          const cls = n<s ? 'done' : n===s ? 'current' : '';
          return `<div class="step ${cls}"><span class="n">${n}</span><span class="lbl">${l}</span></div>`;
        }).join('')}
      </div>
      <div id="wiz-body">${renderWizardStep()}</div>
    `,
    actions:[
      ...(s>1 ? [{ label:'Back', onClick: ()=>{ saveWizardStep(); state._wizardStep--; renderWizard(); } }] : [{ label:'Cancel', onClick: closeModal }]),
      ...(s<4 ? [{ label:'Continue', cls:'btn-primary', onClick: ()=>{ if(saveWizardStep()){ state._wizardStep++; renderWizard(); } } }] :
              [{ label:'Confirm registration', cls:'btn-primary', onClick: submitWizard }])
    ]
  });
}
function renderWizardStep(){
  const d = state._wizardData;
  const s = state._wizardStep;
  if(s===1) return `
    <div class="grid-2">
      <div class="field"><label>Full name *</label><input id="w-full_name" value="${d.full_name}" required /></div>
      <div class="field"><label>National ID number *</label><input id="w-national_id" value="${d.national_id}" required /></div>
      <div class="field"><label>Date of birth</label><input id="w-date_of_birth" type="date" value="${d.date_of_birth||''}" /></div>
      <div class="field"><label>Gender</label>
        <select id="w-gender"><option ${d.gender==='Male'?'selected':''}>Male</option><option ${d.gender==='Female'?'selected':''}>Female</option><option ${d.gender==='Other'?'selected':''}>Other</option></select>
      </div>
      <div class="field"><label>Phone *</label><input id="w-phone" value="${d.phone}" required placeholder="07XX XXX XXX" /></div>
      <div class="field"><label>Email (optional)</label><input id="w-email" type="email" value="${d.email||''}" /></div>
      <div class="field"><label>Physical address / village / estate</label><input id="w-address" value="${d.address||''}" /></div>
      <div class="field"><label>Nearest town</label><input id="w-nearest_town" value="${d.nearest_town||''}" /></div>
      <div class="field"><label>Occupation</label><input id="w-occupation" value="${d.occupation||''}" /></div>
      <div class="field"><label>Employer (optional)</label><input id="w-employer" value="${d.employer||''}" /></div>
      <div class="field"><label>Income estimate (KES, monthly or weekly)</label><input id="w-income_estimate" type="number" min="0" value="${d.income_estimate||''}" /></div>
    </div>`;
  if(s===2){
    const g = state.data.groups.find(x=>x.id===d.group_id);
    return `
      <div class="grid-2">
        <div class="field"><label>Select group *</label>
          <select id="w-group_id" required>
            <option value="">— Select —</option>
            ${state.data.groups.filter(x=>x.status==='active').map(x=>`<option value="${x.id}" ${d.group_id===x.id?'selected':''}>${x.name}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Meeting day (from group)</label><input id="w-meeting_day" disabled value="${g?.meeting_day||'— select group —'}" /></div>
        <div class="field"><label>Registration fee (KES)</label><input id="w-registration_fee" type="number" min="0" value="${d.registration_fee}" /></div>
        <div class="field"><label>Date of registration</label><input id="w-registered_on" type="date" value="${d.registered_on}" /></div>
        <div class="field"><label>Assigned loan officer</label>
          <select id="w-officer_id">
            <option value="">— Auto from group —</option>
            ${state.data.staff.filter(s=>s.role==='officer' && s.status==='active').map(s=>`<option value="${s.id}" ${d.officer_id===s.id?'selected':''}>${s.full_name}</option>`).join('')}
          </select>
        </div>
      </div>`;
  }
  if(s===3){
    return `
      <p class="muted" style="margin-top:0">At least one guarantor is required. A second guarantor is recommended for higher loan amounts.</p>
      ${d.guarantors.map((gn,i) => `
        <div class="card card-pad" style="margin-bottom:12px">
          <div class="card-head" style="padding:0 0 12px;border:none">
            <h3>Guarantor ${i+1}</h3>
            ${i>0 ? `<button class="btn btn-sm btn-outline" onclick="removeGuarantor(${i})">Remove</button>` : ''}
          </div>
          <div class="grid-2">
            <div class="field"><label>Full name *</label><input data-g="${i}" data-f="full_name" value="${gn.full_name}" required /></div>
            <div class="field"><label>National ID *</label><input data-g="${i}" data-f="national_id" value="${gn.national_id}" required /></div>
            <div class="field"><label>Phone *</label><input data-g="${i}" data-f="phone" value="${gn.phone}" required /></div>
            <div class="field"><label>Location / village</label><input data-g="${i}" data-f="location" value="${gn.location||''}" /></div>
            <div class="field"><label>Relationship</label>
              <select data-g="${i}" data-f="relationship">
                ${['Spouse','Sibling','Parent','Friend','Colleague','Other'].map(r=>`<option ${gn.relationship===r?'selected':''}>${r}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
      `).join('')}
      ${d.guarantors.length<2 ? `<button class="btn btn-outline" onclick="addGuarantor()">Add second guarantor</button>` : ''}
    `;
  }
  // Step 4: Review
  const g = state.data.groups.find(x=>x.id===d.group_id);
  const off = state.data.staff.find(x=>x.id===(d.officer_id||g?.officer_id));
  return `
    <p class="muted" style="margin-top:0">Review the information below before confirming registration.</p>
    <table class="summary-table">
      <tr><td colspan="2"><h5>Personal details</h5></td></tr>
      <tr><td>Full name</td><td>${d.full_name}</td></tr>
      <tr><td>National ID</td><td>${d.national_id}</td></tr>
      <tr><td>Date of birth</td><td>${fmtDate(d.date_of_birth)}</td></tr>
      <tr><td>Gender</td><td>${d.gender}</td></tr>
      <tr><td>Phone</td><td>${d.phone}</td></tr>
      <tr><td>Email</td><td>${d.email||'—'}</td></tr>
      <tr><td>Address</td><td>${d.address||'—'}</td></tr>
      <tr><td>Occupation</td><td>${d.occupation||'—'}${d.employer?' · '+d.employer:''}</td></tr>
      <tr><td>Income estimate</td><td>${d.income_estimate ? KES(d.income_estimate) : '—'}</td></tr>
      <tr><td colspan="2"><h5>Group assignment</h5></td></tr>
      <tr><td>Group</td><td>${g?.name||'—'}</td></tr>
      <tr><td>Meeting day</td><td>${g?.meeting_day||'—'}</td></tr>
      <tr><td>Loan officer</td><td>${off?.full_name||'—'}</td></tr>
      <tr><td>Date of registration</td><td>${fmtDate(d.registered_on)}</td></tr>
      <tr><td colspan="2"><h5>Guarantors</h5></td></tr>
      ${d.guarantors.map((gn,i)=>`<tr><td>Guarantor ${i+1}</td><td>${gn.full_name} · ${gn.national_id} · ${gn.phone}${gn.relationship?' · '+gn.relationship:''}</td></tr>`).join('')}
      <tr><td colspan="2"><h5>Fee</h5></td></tr>
      <tr><td>Registration fee</td><td><b>${KES(d.registration_fee)}</b></td></tr>
    </table>
  `;
}
function saveWizardStep(){
  const d = state._wizardData;
  const s = state._wizardStep;
  if(s===1){
    ['full_name','national_id','date_of_birth','gender','phone','email','address','nearest_town','occupation','employer','income_estimate'].forEach(k => {
      const el = document.getElementById('w-'+k); if(el) d[k] = el.value;
    });
    d.phone = normalisePhone(d.phone);
    if(!d.full_name || !d.national_id || !d.phone){ toast('Full name, National ID and phone are required.','error'); return false; }
    const dup = state.data.members.find(m => m.national_id === d.national_id);
    if(dup){ toast('A member with this National ID already exists.','error'); return false; }
  }
  if(s===2){
    d.group_id = $('w-group_id').value;
    d.registration_fee = parseFloat($('w-registration_fee').value)||0;
    d.registered_on = $('w-registered_on').value;
    d.officer_id = $('w-officer_id').value;
    if(!d.group_id){ toast('Please select a group.','error'); return false; }
  }
  if(s===3){
    document.querySelectorAll('[data-g]').forEach(el => {
      d.guarantors[parseInt(el.dataset.g)][el.dataset.f] = el.value;
    });
    const g1 = d.guarantors[0];
    if(!g1.full_name || !g1.national_id || !g1.phone){ toast('At least one complete guarantor is required.','error'); return false; }
  }
  return true;
}
function addGuarantor(){ saveWizardStep(); state._wizardData.guarantors.push({ full_name:'', national_id:'', phone:'', location:'', relationship:'Friend' }); renderWizard(); }
function removeGuarantor(i){ saveWizardStep(); state._wizardData.guarantors.splice(i,1); renderWizard(); }

async function submitWizard(){
  if(!(await ensureFreshToken())) return;
  const d = state._wizardData;
  const g = state.data.groups.find(x=>x.id===d.group_id);
  const officer_id = d.officer_id || g?.officer_id || null;

  const memberRow = {
    group_id: d.group_id, full_name: d.full_name, national_id: d.national_id,
    date_of_birth: d.date_of_birth || null, gender: d.gender, phone: d.phone, email: d.email || null,
    address: d.address || null, nearest_town: d.nearest_town || null, occupation: d.occupation || null,
    employer: d.employer || null, income_estimate: d.income_estimate ? Number(d.income_estimate) : null,
    registration_fee: Number(d.registration_fee)||0, registered_on: d.registered_on, officer_id, status:'active'
  };

  const { data: created, error } = await sb.from('pb_members').insert(memberRow).select().single();
  if(error) return toast(error.message, 'error');

  const guars = d.guarantors.filter(x=>x.full_name && x.national_id).map((x,i) => ({
    member_id: created.id, full_name: x.full_name, national_id: x.national_id,
    phone: normalisePhone(x.phone), location: x.location || null,
    relationship: x.relationship || null, position: i+1
  }));
  if(guars.length){
    const { error: ge } = await sb.from('pb_guarantors').insert(guars);
    if(ge) toast('Member saved, but guarantor save failed: '+ge.message, 'warn');
    else state.data.guarantors.push(...guars);
  }
  state.data.members.unshift(created);
  audit('register_member','pb_members',created.id,null,memberRow);
  closeModal();
  toast('Member registered successfully.', 'success');
  render();
}

async function submitMeeting(){
  const m = state._meet;
  if(!m.groupId || !m.date) return toast('Group and date are required.', 'error');
  const members = state.data.members.filter(x=>x.group_id===m.groupId && x.status==='active');

  // Create or fetch meeting record
  let meetingId = null;
  const existing = state.data.meetings.find(x=>x.group_id===m.groupId && x.meeting_date===m.date);
  if(existing){ meetingId = existing.id; }
  else {
    const { data, error } = await sb.from('pb_meetings').insert({
      group_id: m.groupId, meeting_date: m.date, recorded_by: state.staff.id
    }).select().single();
    if(error) return toast(error.message, 'error');
    meetingId = data.id; state.data.meetings.unshift(data);
  }

  const savRows = []; const repRows = [];
  for(const mem of members){
    const e = m.entries[mem.id] || {};
    if(e.absent){ continue; }
    const sav = Number(e.savings)||0;
    const rep = Number(e.repayment)||0;
    if(sav>0){
      savRows.push({ member_id: mem.id, group_id: m.groupId, meeting_id: meetingId, meeting_date: m.date, amount: sav, recorded_by: state.staff.id, notes: e.notes||null });
    }
    const ln = memberLoan(mem.id);
    if(rep>0 && ln){
      // proportional split based on loan ratio
      const ir = Number(ln.total_payable) ? (Number(ln.total_payable)-Number(ln.loan_value))/Number(ln.total_payable) : 0;
      const interest = +(rep*ir).toFixed(2);
      const principal = +(rep-interest).toFixed(2);
      repRows.push({ loan_id: ln.id, member_id: mem.id, group_id: m.groupId, meeting_id: meetingId, meeting_date: m.date, amount: rep, principal, interest, recorded_by: state.staff.id });
    }
  }

  let okSav=0, okRep=0, fail=0;
  for(const r of savRows){
    const res = await queuedInsert('pb_savings', r);
    if(res.ok){ okSav++; if(!res.queued) state.data.savings.unshift({ ...r, id:'tmp_'+Math.random() }); } else fail++;
  }
  for(const r of repRows){
    const res = await queuedInsert('pb_repayments', r);
    if(res.ok){ okRep++; if(!res.queued) state.data.repayments.unshift({ ...r, id:'tmp_'+Math.random() }); } else fail++;
  }
  audit('meeting_submit', 'pb_meetings', meetingId, null, { savings: okSav, repayments: okRep });

  // Auto-complete loans whose outstanding hits zero
  for(const r of repRows){
    const ln = state.data.loans.find(l=>l.id===r.loan_id);
    if(ln && (Number(ln.total_payable) - loanPaid(ln.id)) <= 0){
      await sb.from('pb_loans').update({ status:'completed' }).eq('id', ln.id);
      ln.status='completed';
    }
  }

  toast(`Meeting saved. Savings entries: ${okSav}. Repayments: ${okRep}.${fail?' Failed: '+fail:''}`, fail?'warn':'success');
  state._meet = { groupId:'', date: todayISO(), entries:{} };
  render();
}

function pageCalculator(){
  $('page').innerHTML = `

        <div class="field"><label>Interest method</label>
          <select id="c-method"><option value="flat">Flat rate</option><option value="reducing">Reducing balance</option></select>
        </div>
        <div class="field"><label>Loan start date</label><input id="c-start" type="date" value="${todayISO()}" /></div>
        <button class="btn btn-primary btn-block" onclick="runCalc()">Compute schedule</button>
      </div>
      <div id="calc-out"></div>
    </div>
  `;
  runCalc();
}
function runCalc(){
  const amount = Number($('c-amount').value)||0;
  const weekly = Number($('c-weekly').value)||0;
  const method = $('c-method').value;
  const start = new Date($('c-start').value);
  const r = computeSchedule(amount, weekly, method, start);
  const tooLong = r.weeks > (state.settings?.max_loan_weeks || 52);
  $('calc-out').innerHTML = `
    <div class="card card-pad">
      <h3 style="margin:0 0 12px">Result</h3>
      <table class="summary-table">
        <tr><td>Principal</td><td>${KES(amount)}</td></tr>
        <tr><td>Total interest</td><td>${KES(r.totalInterest)}</td></tr>
        <tr><td>Total payable</td><td><b>${KES(r.totalPayable)}</b></td></tr>
        <tr><td>Weeks to complete</td><td>${r.weeks}</td></tr>
        <tr><td>Suggested weekly installment</td><td>${KES(r.suggestedWeekly)}</td></tr>
      </table>
      ${tooLong ? `<div class="auth-error" style="margin-top:12px">Repayment exceeds the maximum loan term of ${state.settings?.max_loan_weeks||52} weeks. Consider increasing the weekly amount to at least ${KES(r.suggestedWeekly)}.</div>`:''}
    </div>
    <div class="card" style="margin-top:14px">
      <div class="card-head"><h3>Week-by-week schedule</h3></div>
      <div class="table-wrap" style="border:none;border-radius:0">
        <table class="tbl">
          <thead><tr><th>Wk</th><th>Due</th><th class="num">Principal</th><th class="num">Interest</th><th class="num">Installment</th><th class="num">Balance</th></tr></thead>
          <tbody>${r.rows.map(x=>`<tr><td>${x.w}</td><td>${fmtDate(x.due)}</td><td class="num">${KES(x.principal)}</td><td class="num">${KES(x.interest)}</td><td class="num">${KES(x.installment)}</td><td class="num">${KES(x.balance)}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
  `;
}
function computeSchedule(principal, weekly, method, startDate){
  const monthlyRate = Number(state.settings?.monthly_interest_rate || 0.025);
  const weeklyRate = monthlyRate * 12 / 52;
  const max = state.settings?.max_loan_weeks || 52;
  const rows = [];
  if(method === 'flat'){
    // Estimate weeks from desired weekly. Iterate weeks 1..max+10 to find feasible.
    let weeks = Math.max(1, Math.ceil(principal / Math.max(1, weekly - principal*weeklyRate)));
    if(!isFinite(weeks) || weeks<1) weeks = max;
    let totalInterest = principal * weeklyRate * weeks;
    let totalPayable = principal + totalInterest;
    let inst = weekly > 0 ? weekly : totalPayable / weeks;
    weeks = Math.ceil(totalPayable / inst);
    totalInterest = principal * weeklyRate * weeks;
    totalPayable = principal + totalInterest;
    inst = totalPayable / weeks;
    let bal = totalPayable;
    const principalPerWk = principal / weeks;
    const interestPerWk = totalInterest / weeks;
    for(let w=1; w<=weeks; w++){
      bal -= inst;
      const due = new Date(startDate); due.setDate(due.getDate() + 7*w);
      rows.push({ w, due, principal:principalPerWk, interest:interestPerWk, installment:inst, balance:Math.max(0,bal) });
    }
    const suggestedWeekly = totalPayable / Math.min(max, weeks);
    return { weeks, totalInterest, totalPayable, suggestedWeekly, rows };
  } else {
    // reducing
    let bal = principal; let w = 0; let totalInterest = 0; const cap = max + 20;
    while(bal > 0.01 && w < cap){
      w++;
      const interest = bal * weeklyRate;
      const principalPart = Math.min(bal, Math.max(0, weekly - interest));
      const installment = principalPart + interest;
      bal -= principalPart;
      totalInterest += interest;
      const due = new Date(startDate); due.setDate(due.getDate() + 7*w);
      rows.push({ w, due, principal:principalPart, interest, installment, balance:Math.max(0,bal) });
    }
    const totalPayable = principal + totalInterest;
    return { weeks: w, totalInterest, totalPayable, suggestedWeekly: totalPayable/Math.min(max,w||1), rows };
  }
}

          <span class="ic" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none">${ic('<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>')}</span>
        </div>
        <div id="ord-ast-list" style="max-height:180px;overflow-y:auto;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);display:none;background:var(--surface);box-shadow:var(--shadow-md)"></div>

function rejectOrder(o){
  modal({
    title:'Reject order', body:`<div class="field"><label>Reason</label><textarea id="rj" rows="3" required></textarea></div>`,
    actions:[
      { label:'Cancel', onClick: closeModal },
      { label:'Reject', cls:'btn-danger', onClick: async () => {
        const reason = $('rj').value.trim(); if(!reason) return toast('Reason is required.','error');
        await sb.from('pb_orders').update({ status:'rejected', rejection_reason:reason, approved_by:state.staff.id }).eq('id', o.id);
        Object.assign(o, { status:'rejected', rejection_reason:reason });
        audit('order_reject','pb_orders',o.id,null,{reason}); closeModal(); render(); toast('Order rejected','warn');
      }}
    ]
  });
}
function approveOrder(o){
  const asset = state.data.inventory.find(x=>x.id===o.asset_id);
  const member = state.data.members.find(x=>x.id===o.member_id);
  if(!asset || !member) return toast('Order references missing asset or member.','error');
  if(asset.stock < o.quantity) return toast('Insufficient stock to fulfill this order.','error');
  modal({
    title:`Approve & issue loan — ${member.full_name}`,
    body:`<form id="al">
      <table class="summary-table">
        <tr><td>Asset</td><td>${asset.name} × ${o.quantity}</td></tr>
        <tr><td>Loan value</td><td><b>${KES(asset.loan_price * o.quantity)}</b></td></tr>
      </table>
      <div class="divider"></div>
      <div class="grid-2">
        <div class="field"><label>Weekly installment (KES)</label><input id="wi" type="number" min="1" value="500" required /></div>
        <div class="field"><label>Loan start date</label><input id="sd" type="date" value="${todayISO()}" /></div>
      </div>
      <div id="al-out" class="muted" style="font-size:12px"></div>
    </form>`,
    actions:[
      { label:'Cancel', onClick: closeModal },
      { label:'Issue loan', cls:'btn-primary', onClick: async () => {
        if(!(await ensureFreshToken())) return;
        const weekly = Number($('wi').value)||0;
        const start = new Date($('sd').value);
        const principal = asset.loan_price * o.quantity;
        const r = computeSchedule(principal, weekly, 'flat', start);
        const max = state.settings?.max_loan_weeks||52;
        if(weekly <= 0) return toast('Weekly installment must be greater than zero.','error');
        if(r.weeks > max){
          toast(`Warning: schedule is ${r.weeks} weeks, which exceeds the configured maximum of ${max} weeks. Issuing anyway.`, 'warn');
        }
        const end = new Date(start); end.setDate(end.getDate() + 7*r.weeks);
        const loan = {
          member_id: member.id, group_id: member.group_id, officer_id: state.staff.id,
          order_id: o.id, asset_id: asset.id, asset_name: asset.name, asset_quantity: o.quantity,
          loan_value: principal, weekly_installment: weekly, total_payable: r.totalPayable,
          start_date: $('sd').value, expected_end_date: end.toISOString().slice(0,10), status:'active'
        };
        const { data, error } = await sb.from('pb_loans').insert(loan).select().single();
        if(error) return toast('Loan save failed: '+error.message,'error');
        await sb.from('pb_inventory').update({ stock: asset.stock - o.quantity }).eq('id', asset.id);
        asset.stock -= o.quantity;
        await sb.from('pb_orders').update({ status:'fulfilled', approved_by: state.staff.id }).eq('id', o.id);
        Object.assign(o, { status:'fulfilled', approved_by: state.staff.id });
        state.data.loans.unshift(data); audit('loan_issue','pb_loans',data.id,null,loan);
        closeModal(); render(); toast('Loan issued and stock deducted','success');
      }}
    ]
  });
  setTimeout(() => {
    const upd = () => {
      const w = Number($('wi').value)||0; const s = new Date($('sd').value||todayISO());
      const r = computeSchedule(asset.loan_price * o.quantity, w, 'flat', s);
      $('al-out').innerHTML = `Total payable ${KES(r.totalPayable)} · Total interest ${KES(r.totalInterest)} · ${r.weeks} weeks${r.weeks>(state.settings?.max_loan_weeks||52)?' <span class="danger-text">(exceeds max term)</span>':''}`;
    };
    $('wi').addEventListener('input', upd); $('sd').addEventListener('change', upd); upd();
  }, 50);
}

function buildReportRows(kind){
  if(kind==='savings') return state.data.savings.map(s => {
    const m = state.data.members.find(x=>x.id===s.member_id), g = state.data.groups.find(x=>x.id===s.group_id);
    return { Date:s.meeting_date, Member:m?.full_name||'—', ID:m?.national_id||'—', Group:g?.name||'—', Amount:Number(s.amount) };
  });
  if(kind==='repayments') return state.data.repayments.map(r => {
    const m = state.data.members.find(x=>x.id===r.member_id);
    return { Date:r.meeting_date, Member:m?.full_name||'—', Amount:Number(r.amount), Principal:Number(r.principal), Interest:Number(r.interest) };
  });
  if(kind==='loans') return state.data.loans.map(l => {
    const m = state.data.members.find(x=>x.id===l.member_id);
    return { Member:m?.full_name||'—', Asset:l.asset_name, LoanValue:Number(l.loan_value), Weekly:Number(l.weekly_installment), Paid:loanPaid(l.id), Outstanding:Number(l.total_payable)-loanPaid(l.id), Status:l.status };
  });
  if(kind==='members') return state.data.members.map(m => {
    const g = state.data.groups.find(x=>x.id===m.group_id);
    return { Name:m.full_name, ID:m.national_id, Phone:m.phone, Group:g?.name||'—', Savings:memberSavings(m.id), Eligible:memberEligible(m.id)?'Yes':'No', Status:m.status };
  });
  if(kind==='inventory') return state.data.inventory.map(a => ({
    Name:a.name, Category:a.category, Qty:a.stock, CostPerUnit:Number(a.buying_price), LoanPricePerUnit:Number(a.loan_price),
    TotalCostValue:Number(a.buying_price)*a.stock, TotalLoanValue:Number(a.loan_price)*a.stock
  }));
  if(kind==='orders') return state.data.orders.map(o => {
    const m = state.data.members.find(x=>x.id===o.member_id);
    return { Date:o.ordered_on, Member:m?.full_name||'—', Asset:o.asset_name, Qty:o.quantity, Status:o.status };
  });
  return [];
}
function previewReport(kind){
  const rows = buildReportRows(kind);
  if(!rows.length) return toast('No data to preview for this report.','warn');
  const cols = Object.keys(rows[0]);
  const titles = { savings:'Savings Ledger', repayments:'Repayments Register', loans:'Active Loans', members:'Members Directory', inventory:'Inventory Valuation', orders:'Orders Log' };
  modal({
    title: `Preview: ${titles[kind]||kind}`,
    size:'lg',
    body:`<div class="muted" style="font-size:12px;margin-bottom:10px">${rows.length} records. Showing up to 50.</div>
    <div style="overflow-x:auto;max-height:400px;overflow-y:auto">
      <table class="tbl" style="min-width:500px">
        <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${rows.slice(0,50).map(r=>`<tr>${cols.map(c=>{
          const v = r[c];
          const isNum = typeof v === 'number';
          return `<td${isNum?' class="num"':''}>${isNum?KES(v):v}</td>`;
        }).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
    ${rows.length > 50 ? `<div class="muted" style="font-size:12px;margin-top:8px">${rows.length-50} more rows not shown. Export to Excel for full data.</div>` : ''}`,
    actions:[
      { label:'Close', onClick: closeModal },
      { label:'Export to Excel', cls:'btn-primary', onClick: ()=>{ closeModal(); exportReport(kind); } }
    ]
  });
}
function exportReport(kind){
  const rows = buildReportRows(kind);
  if(!rows.length) return toast('No data to export.','warn');
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, kind);
  XLSX.writeFile(wb, `${kind}_${todayISO()}.xlsx`);
  toast(`${kind} report exported`, 'success');
}

async function ensurePin(){
  const pins = lsGet('pins', {});
  if(pins[state.staff.id]) return;
  modal({
    title:'Set your switch-user PIN',
    body:`<p class="muted" style="font-size:13px">Choose a 4-digit PIN to switch back to your account on this device without retyping your password.</p>
      <div class="field"><label>4-digit PIN</label><input id="np" type="password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" required /></div>`,
    actions:[
      { label:'Skip for now', onClick: closeModal },
      { label:'Save PIN', cls:'btn-primary', onClick: async () => {
        const v = ($('np').value||'').trim();
        if(!/^\d{4}$/.test(v)) return toast('PIN must be exactly 4 digits.','error');
        const h = await sha256(v + ':' + state.staff.id);
        const all = lsGet('pins', {}); all[state.staff.id] = { h, name: state.staff.full_name, role: state.staff.role };
        lsSet('pins', all);
        closeModal(); toast('PIN saved.','success');
      }}
    ]
  });
}
function openSwitchUser(){
  const pins = lsGet('pins', {});
  const ids = Object.keys(pins).filter(id => id !== state.staff.id);
  if(!ids.length){
    return modal({
      title:'Switch user',
      body:`<p>No other accounts have set a PIN on this device yet. Each officer must sign in normally once and then save a PIN from the prompt that follows their first sign-in.</p>`,
      actions:[{ label:'OK', cls:'btn-primary', onClick: closeModal }]
    });
  }
  modal({
    title:'Switch user',
    body:`<div class="field"><label>Select account</label>
      <select id="su-id">${ids.map(id => `<option value="${id}">${pins[id].name} · ${pins[id].role}</option>`).join('')}</select></div>
      <div class="field"><label>Enter PIN</label><input id="su-pin" type="password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" /></div>`,
    actions:[
      { label:'Cancel', onClick: closeModal },
      { label:'Switch', cls:'btn-primary', onClick: async () => {
        const id = $('su-id').value, pin = ($('su-pin').value||'').trim();
        const h = await sha256(pin + ':' + id);
        if(h !== pins[id].h) return toast('Incorrect PIN.','error');
        const target = state.data.staff.find(s=>s.id===id);
        if(!target) return toast('Staff record not found locally.','error');
        await audit('switch_user','auth', state.staff.id, null, { to: id });
        state.staff = target;
        const { data: perms } = await sb.from('pb_permissions').select('*').eq('staff_id', id).maybeSingle();
        state.perms = perms || {};
        closeModal(); render(); toast('Switched to ' + target.full_name, 'success');
      }}
    ]
  });
}

  const dd = $(`pur-ast-dd-${i}`); if(!dd) return;
  _purLines[i].asset_name = q;
  const matches = state.data.inventory.filter(a=>a.name.toLowerCase().includes((q||'').toLowerCase())).slice(0,8);
  const showAdd = q && q.trim().length > 1 && !state.data.inventory.find(a=>a.name.toLowerCase()===q.toLowerCase());
  if(!matches.length && !showAdd){ dd.style.display='none'; return; }
  dd.style.display='block';
  dd.innerHTML = matches.map(a=>`<div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px" onmousedown="purSelectAsset(${i},'${a.id}','${a.name.replace(/'/g,"\\'")}',${ a.buying_price},false)">${a.name}<span class="muted" style="font-size:11px;margin-left:8px">cost ${KES(a.buying_price)} · stock ${a.stock}</span></div>`).join('')
    + (showAdd ? `<div style="padding:8px 12px;cursor:pointer;font-size:13px;color:var(--accent);font-weight:600" onmousedown="purSelectAsset(${i},'','${q.replace(/'/g,"\\'")}',0,true)">+ Add as new item: "${q}"</div>` : '');
}
function purSelectAsset(i, id, name, defaultCost, isNew){
  _purLines[i].asset_id = id;
  _purLines[i].asset_name = name;
  _purLines[i].isNew = isNew;
  if(!_purLines[i].cost_per_unit) _purLines[i].cost_per_unit = Number(defaultCost)||0;
  _purLines[i].subtotal = Number(_purLines[i].quantity||0)*Number(_purLines[i].cost_per_unit||0);
  renderPurLines();
  const inp = $(`pur-ast-q-${i}`); if(inp) inp.value = name;
  const dd = $(`pur-ast-dd-${i}`); if(dd) dd.style.display='none';
}
function purLineUpd(i, key, val, fromSubtotal){
  _purLines[i][key] = key==='batch_no' ? val : (val === '' ? 0 : Number(val));
  if(fromSubtotal && _purLines[i].quantity > 0){
    _purLines[i].cost_per_unit = Number(val) / Number(_purLines[i].quantity);
  } else if(key === 'quantity' || key === 'cost_per_unit'){
    _purLines[i].subtotal = Number(_purLines[i].quantity||0) * Number(_purLines[i].cost_per_unit||0);
  }
  const total = _purLines.reduce((a,b)=>a+Number(b.subtotal||0),0);
  if($('pur-total-auto')) $('pur-total-auto').value = total.toFixed(2);
}
function purRemoveLine(i){ _purLines.splice(i,1); renderPurLines(); }
async function submitPurchase(){
  if(!(await ensureFreshToken())) return;
  const fd = new FormData($('pur-f'));
  const row = Object.fromEntries(fd);
  if(!row.supplier_id) return toast('Choose a supplier.','error');
  const validLines = _purLines.filter(l => l.asset_name && Number(l.quantity)>0);
  if(!validLines.length) return toast('Add at least one line item.','error');
  const auto = validLines.reduce((a,b)=>a+Number(b.subtotal||0),0);
  const override = Number($('pur-total-override').value)||0;
  const total = override > 0 ? override : auto;
  const sup = state.data.suppliers.find(x=>x.id===row.supplier_id);
  const purchase = {
    supplier_id: row.supplier_id, supplier_name: sup?.name,
    invoice_no: row.invoice_no||null, received_on: row.received_on,
    total_cost: total, notes: row.notes||null,
    received_by: state.staff.id, received_by_name: state.staff.full_name,
    items: validLines
  };
  const { data: created, error } = await sb.from('pb_purchases').insert(purchase).select().single();
  if(error) return toast(error.message,'error');
  if(validLines.length){
    const lineRows = validLines.map(l => ({
      purchase_id: created.id, asset_id: l.asset_id||null, asset_name: l.asset_name,
      quantity: Number(l.quantity), cost_per_unit: Number(l.cost_per_unit),
      subtotal: Number(l.subtotal)||Number(l.quantity)*Number(l.cost_per_unit),
      batch_no: l.batch_no||null
    }));
    await sb.from('pb_purchase_lines').insert(lineRows);
  }
  for(const l of validLines){
    const costPerUnit = Number(l.cost_per_unit)||0;
    const qty = Number(l.quantity)||0;
    if(l.isNew || !l.asset_id){
      // New item: create inventory record
      const newRow = {
        name: l.asset_name, category: 'Other', stock: qty,
        buying_price: costPerUnit,
        loan_price: Math.round(costPerUnit * 1.15 * 100) / 100, // default 15% margin
        reorder_level: 5
      };
      const { data: newAsset, error: ae } = await sb.from('pb_inventory').insert(newRow).select().single();
      if(!ae && newAsset){
        state.data.inventory.unshift(newAsset);
        toast(`New inventory item "${l.asset_name}" added.`, 'info');
      }
    } else {
      const a = state.data.inventory.find(x=>x.id===l.asset_id);
      if(!a) continue;
      const prevStock = Number(a.stock||0);
      const newStock = prevStock + qty;
      // Weighted average cost for buying_price
      const prevCost = Number(a.buying_price||0);
      const weightedCost = prevStock > 0
        ? Math.round(((prevCost * prevStock) + (costPerUnit * qty)) / newStock * 100) / 100
        : costPerUnit;
      // Scale loan_price proportionally if buying_price changed
      const prevLoanPrice = Number(a.loan_price||0);
      const margin = prevCost > 0 ? prevLoanPrice / prevCost : 1.15;
      const newLoanPrice = Math.round(weightedCost * margin * 100) / 100;
      await sb.from('pb_inventory').update({
        stock: newStock, buying_price: weightedCost, loan_price: newLoanPrice
      }).eq('id', a.id);
      a.stock = newStock; a.buying_price = weightedCost; a.loan_price = newLoanPrice;
    }
  }
  state.data.purchases.unshift(created);
  audit('purchase_create','pb_purchases',created.id, null, { total, lines: validLines.length });
  closeModal(); render(); toast('Stock received and inventory updated','success');
}

/* =====================================================================
 * PAGE: PAYBILL RECONCILIATION
 * ===================================================================== */
function pageReconciliation(){
  const list = (state.data.reconciliations||[]).slice().sort((a,b)=> new Date(b.meeting_date)-new Date(a.meeting_date));
  $('page').innerHTML = `
    <div class="page-head">
      <div><h1>Paybill reconciliation</h1><div class="desc">Track chairman remittances of weekly collections to the M-Pesa Paybill.</div></div>
      <div class="actions"><button class="btn btn-primary" onclick="openReconForm()">Record remittance</button></div>
    </div>
    <div class="table-wrap"><table class="tbl">
      <thead><tr><th>Meeting date</th><th>Group</th><th class="num">Savings</th><th class="num">Repayments</th><th class="num">Grand total</th><th>M-Pesa ref</th><th>Status</th><th></th></tr></thead>
      <tbody>${list.map(r => {
        const g = state.data.groups.find(x=>x.id===r.group_id);
        return `<tr>
          <td>${fmtDate(r.meeting_date)}</td>
          <td>${g?.name||'—'}</td>
          <td class="num">${KES(r.total_savings)}</td>
          <td class="num">${KES(r.total_repayments)}</td>
          <td class="num"><b>${KES(r.grand_total)}</b></td>
          <td>${r.mpesa_reference||'—'}</td>
          <td><span class="badge ${r.status==='confirmed'?'b-green':'b-yellow'}">${r.status}</span></td>
          <td><button class="act-btn" onclick="reconActions(event,'${r.id}')">···</button></td>
        </tr>`;
      }).join('') || `<tr><td colspan="8"><div class="empty"><h4>No remittances recorded</h4><p>Record the chairman's M-Pesa remittance after each meeting.</p></div></td></tr>`}</tbody>
    </table></div>`;
}
function reconActions(ev, id){
  const r = state.data.reconciliations.find(x=>x.id===id);
  showActMenu(ev, [
    ...(r.status==='pending' ? [{ label:'Mark as confirmed', onClick: async () => {
      await sb.from('pb_reconciliations').update({ status:'confirmed' }).eq('id', id);
      r.status='confirmed'; audit('recon_confirm','pb_reconciliations',id); render(); toast('Remittance confirmed','success');
    }}] : []),
    { label:'Delete', danger:true, onClick: ()=>confirmDialog('Delete this remittance record?', async()=>{
      await sb.from('pb_reconciliations').delete().eq('id', id);
      state.data.reconciliations = state.data.reconciliations.filter(x=>x.id!==id);
      audit('delete','pb_reconciliations',id); render(); toast('Remittance deleted','success');
    }, { title:'Delete remittance', danger:true }) }
  ]);
}
function openReconForm(){
  const groups = state.data.groups;
  modal({
    title:'Record paybill remittance',
    body:`<form id="rec-f">
      <div class="field"><label>Group *</label>
        <select name="group_id" required onchange="reconAutoTotals(this.value)">
          <option value="">— Select group —</option>
          ${groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Meeting date *</label><input type="date" name="meeting_date" value="${todayISO()}" required onchange="reconAutoTotals()" /></div>
      <div class="grid-2">
        <div class="field">
          <label>Total savings collected (KES)</label>
          <input id="rec-sv" name="total_savings" type="number" min="0" step="0.01" value="0" oninput="reconRecalc()" />
          <div class="helper">Auto-filled from meeting records. Adjust if cash collected differs.</div>
        </div>
        <div class="field">
          <label>Total repayments collected (KES)</label>
          <input id="rec-rp" name="total_repayments" type="number" min="0" step="0.01" value="0" oninput="reconRecalc()" />
          <div class="helper">Auto-filled from meeting records. Adjust if cash collected differs.</div>
        </div>
      </div>
      <div class="field"><label>Grand total (auto-calculated)</label><input id="rec-gt" disabled value="0" /></div>
      <div class="grid-2">
        <div class="field">
          <label>M-Pesa reference number</label>
          <input name="mpesa_reference" placeholder="e.g. QHJ4KL2MPX" />
          <div class="helper">The M-Pesa confirmation code the chairman sends after remitting via Paybill. Found in the SMS sent to the chairman's phone after payment.</div>
        </div>
        <div class="field"><label>Date remitted to Paybill</label><input type="date" name="remitted_on" value="${todayISO()}" /></div>
      </div>
      <div class="field"><label>Notes</label><textarea name="notes" rows="2"></textarea></div>
    </form>`,
    actions:[
      { label:'Cancel', onClick: closeModal },
      { label:'Save', cls:'btn-primary', onClick: async () => {
        if(!(await ensureFreshToken())) return;
        const fd = new FormData($('rec-f')); const row = Object.fromEntries(fd);
        ['total_savings','total_repayments'].forEach(k => row[k] = Number(row[k])||0);
        row.grand_total = row.total_savings + row.total_repayments;
        row.status = 'pending';
        const { data, error } = await sb.from('pb_reconciliations').insert(row).select().single();
        if(error) return toast(error.message,'error');
        state.data.reconciliations.unshift(data);
        audit('recon_create','pb_reconciliations',data.id);
        closeModal(); render(); toast('Remittance recorded','success');
      }}
    ]
  });
}
function reconRecalc(){
  const a = Number($('rec-sv').value)||0, b = Number($('rec-rp').value)||0;
  $('rec-gt').value = (a+b).toFixed(2);
}
function reconAutoTotals(groupId){
  const f = $('rec-f'); if(!f) return;
  const gid = groupId || f.querySelector('[name="group_id"]')?.value;
  const date = f.querySelector('[name="meeting_date"]')?.value;
  if(!gid || !date) return;
  const sv = state.data.savings.filter(s=>s.group_id===gid && s.meeting_date===date).reduce((a,b)=>a+Number(b.amount||0),0);
  const rp = state.data.repayments.filter(r=>r.group_id===gid && r.meeting_date===date).reduce((a,b)=>a+Number(b.amount||0),0);
  if($('rec-sv')) $('rec-sv').value = sv;
  if($('rec-rp')) $('rec-rp').value = rp;
  reconRecalc();
  if(sv > 0 || rp > 0){
    toast(`Auto-filled from meeting on ${date}: savings ${KES(sv)}, repayments ${KES(rp)}.`, 'info');
  }
}

/* =====================================================================
 * BOOT
 * ===================================================================== */
(async function boot(){
  applyTheme();
  // Restore session
  const { data } = await sb.auth.getSession();
  if(data.session){
    state.session = data.session;
    const ok = await loadStaff();
    if(!ok){ await sb.auth.signOut(); state.session=null; render(); return; }
    await loadSettings();
    await smartLoadAll();
    setupRealtime();
    flushQueue();
  }
  render();
  // Restore view position after a page refresh
  const restoreView = sessionStorage.getItem('pb_restore_view');
  const restoreCtx = sessionStorage.getItem('pb_restore_ctx');
  if(state.session && restoreView){
    sessionStorage.removeItem('pb_restore_view');
    sessionStorage.removeItem('pb_restore_ctx');
    state.view = restoreView;
    try { state.viewCtx = restoreCtx ? JSON.parse(restoreCtx) : null; } catch{ state.viewCtx = null; }
    render();
  }
  if(!navigator.onLine) setBanner('You are offline. Cached data shown. Changes will be queued.');
})();
</script>
