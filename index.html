          oninput="purAssetSearch(${i},this.value)" onfocus="purAssetSearch(${i},this.value)" />
        <div id="pur-ast-dd-${i}" style="position:absolute;z-index:50;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);max-height:160px;overflow-y:auto;display:none;box-shadow:var(--shadow-md)"></div>
      </div>
      <div class="field"><label>Quantity received</label><input type="number" min="0.01" step="0.01" value="${l.quantity}" oninput="purLineUpd(${i},'quantity',this.value)" /></div>
      <div class="field"><label>Cost per unit (KES)</label><input type="number" min="0" step="0.01" value="${l.cost_per_unit}" oninput="purLineUpd(${i},'cost_per_unit',this.value)" /></div>
      <div class="field"><label>Line total = <b>${KES(Number(l.quantity||0)*Number(l.cost_per_unit||0))}</b></label><input type="number" min="0" step="0.01" value="${l.subtotal||0}" placeholder="Override line total" oninput="purLineUpd(${i},'subtotal',this.value,true)" /></div>
      <div class="field"><label>Batch / lot</label><input value="${l.batch_no||''}" oninput="purLineUpd(${i},'batch_no',this.value)" /></div>
      <div class="field" style="display:flex;align-items:flex-end"><button type="button" class="btn btn-outline btn-sm" onclick="purRemoveLine(${i})">Remove</button></div>
    </div>
  </div>`).join('');
  const total = _purLines.reduce((a,b)=>a+Number(b.subtotal||0),0);
  if($('pur-total-auto')) $('pur-total-auto').value = total.toFixed(2);
  // Re-attach document click to close dropdowns
  _purLines.forEach((_,i)=>{
    setTimeout(()=>{
      const inp = $(`pur-ast-q-${i}`);
      if(inp) inp.addEventListener('blur', ()=>{ setTimeout(()=>{ const dd=$(`pur-ast-dd-${i}`); if(dd) dd.style.display='none'; },150); });
    },0);
  });
}
function purAssetSearch(i, q){
  const dd = $(`pur-ast-dd-${i}`); if(!dd) return;
  _purLines[i].asset_name = q;
  const matches = state.data.inventory.filter(a=>a.name.toLowerCase().includes((q||'').toLowerCase())).slice(0,8);
  const showAdd = q && q.trim().length > 1 && !state.data.inventory.find(a=>a.name.toLowerCase()===q.toLowerCase());
  if(!matches.length && !showAdd){ dd.style.display='none'; return; }
  dd.style.display='block';
  dd.innerHTML = matches.map(a=>`<div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px" onmousedown="purSelectAsset(${i},'${a.id}','${a.name.replace(/'/g,"\\'")}',${ a.buying_price},false)">${a.name}<span class="muted" style="font-size:11px;margin-left:8px">cost ${KES(a.buying_price)} · stock ${a.stock}</span></div>`).join('')
    + (showAdd ? `<div style="padding:8px 12px;cursor:pointer;font-size:13px;color:var(--accent);font-weight:600" onmousedown="purSelectAsset(${i},'','${q.replace(/'/g,"\\'")}',0,true)">+ Add as new item: "${q}"</div>` : '');
}
function purSelectAsset(i, id, name, defaultCost, isNew){
  _purLines[i].asset_id = id;
  _purLines[i].asset_name = name;
  _purLines[i].isNew = isNew;
  if(!_purLines[i].cost_per_unit) _purLines[i].cost_per_unit = Number(defaultCost)||0;
  _purLines[i].subtotal = Number(_purLines[i].quantity||0)*Number(_purLines[i].cost_per_unit||0);
  renderPurLines();
  const inp = $(`pur-ast-q-${i}`); if(inp) inp.value = name;
  const dd = $(`pur-ast-dd-${i}`); if(dd) dd.style.display='none';
}
function purLineUpd(i, key, val, fromSubtotal){
  _purLines[i][key] = key==='batch_no' ? val : (val === '' ? 0 : Number(val));
  if(fromSubtotal && _purLines[i].quantity > 0){
    _purLines[i].cost_per_unit = Number(val) / Number(_purLines[i].quantity);
  } else if(key === 'quantity' || key === 'cost_per_unit'){
    _purLines[i].subtotal = Number(_purLines[i].quantity||0) * Number(_purLines[i].cost_per_unit||0);
  }
  const total = _purLines.reduce((a,b)=>a+Number(b.subtotal||0),0);
  if($('pur-total-auto')) $('pur-total-auto').value = total.toFixed(2);
}
function purRemoveLine(i){ _purLines.splice(i,1); renderPurLines(); }
async function submitPurchase(){
  if(!(await ensureFreshToken())) return;
  const fd = new FormData($('pur-f'));
  const row = Object.fromEntries(fd);
  if(!row.supplier_id) return toast('Choose a supplier.','error');
  const validLines = _purLines.filter(l => l.asset_name && Number(l.quantity)>0);
  if(!validLines.length) return toast('Add at least one line item.','error');
  const auto = validLines.reduce((a,b)=>a+Number(b.subtotal||0),0);
  const override = Number($('pur-total-override').value)||0;
  const total = override > 0 ? override : auto;
  const sup = state.data.suppliers.find(x=>x.id===row.supplier_id);
  const purchase = {
    business_id: state.staff.business_id || null,
    supplier_id: row.supplier_id, supplier_name: sup?.name||'',
    invoice_no: row.invoice_no||null, received_on: row.received_on,
    total_cost: total, notes: row.notes||null,
    received_by: state.staff.id, received_by_name: state.staff.full_name
    // items column removed — stored in pb_purchase_lines instead
  };
  const { data: created, error } = await sb.from('pb_purchases').insert(purchase).select().single();
  if(error) return toast('Save failed: '+error.message+' — check pb_purchases table columns.','error');
  if(validLines.length){
    const lineRows = validLines.map(l => ({
      business_id: state.staff.business_id || null,
      purchase_id: created.id, asset_id: l.asset_id||null, asset_name: l.asset_name,
      quantity: Number(l.quantity), cost_per_unit: Number(l.cost_per_unit)||0,
      subtotal: Number(l.subtotal)||Number(l.quantity)*Number(l.cost_per_unit||0),
      batch_no: l.batch_no||null
    }));
    const { error: le } = await sb.from('pb_purchase_lines').insert(lineRows);
    if(le) toast('Line items warning: '+le.message,'warn');
  }
  // Attach items for local display
  created.items = validLines;

  // Process each line item sequentially to ensure all hit inventory
  let invUpdated = 0;
  for(const l of validLines){
    const costPerUnit = Number(l.cost_per_unit)||0;
    const qty = Number(l.quantity)||0;
    if(!qty) continue;

    if(l.isNew || !l.asset_id){
      // Brand new asset — create inventory record
      const newRow = {
        business_id: state.staff.business_id || null,
        name: l.asset_name, category:'Other', stock: qty,
        buying_price: costPerUnit,
        loan_price: Math.round(costPerUnit*1.15*100)/100,
        reorder_level: 5
      };
      const { data: newAsset, error: ae } = await sb.from('pb_inventory').insert(newRow).select().single();
      if(ae){ toast(`Failed to add "${l.asset_name}" to inventory: ${ae.message}`,'warn'); continue; }
      state.data.inventory.unshift(newAsset);
      invUpdated++;
    } else {
      // Existing asset — find by id in local state (re-lookup each iteration so previous loops are reflected)
      const a = state.data.inventory.find(x=>x.id===l.asset_id);
      if(!a){ toast(`Asset "${l.asset_name}" not found in local inventory, skipping.`,'warn'); continue; }
      const prevStock = Number(a.stock||0);
      const newStock = prevStock + qty;
      const prevCost = Number(a.buying_price||0);
      const weightedCost = prevStock>0
        ? Math.round(((prevCost*prevStock)+(costPerUnit*qty))/newStock*100)/100
        : costPerUnit;
      const prevLoanPrice = Number(a.loan_price||0);
      const margin = prevCost>0 ? prevLoanPrice/prevCost : 1.15;
      const newLoanPrice = Math.round(weightedCost*margin*100)/100;
      const { error: ue } = await sb.from('pb_inventory').update({
        stock:newStock, buying_price:weightedCost, loan_price:newLoanPrice
      }).eq('id',a.id);
      if(ue){ toast(`Failed to update stock for "${l.asset_name}": ${ue.message}`,'warn'); continue; }
      // Update local state immediately so next iteration sees correct stock
      a.stock = newStock; a.buying_price = weightedCost; a.loan_price = newLoanPrice;
      invUpdated++;
    }
  }
  state.data.purchases.unshift(created);
  audit('purchase_create','pb_purchases',created.id, null, { total, lines: validLines.length });
  closeModal(); render(); toast(`Stock received — ${invUpdated} of ${validLines.length} asset(s) updated in inventory.`,'success');
}

function pageAccounting(){
  const { start, end } = dashDateRange();
  const inRange = date => date >= start && date <= end;
  const filterBtns = [['today','Today'],['yesterday','Yesterday'],['week','This week'],['month','Last month'],['3months','Last 3 months'],['custom','Custom']];

  // === INCOME ===
  const savingsInPeriod = state.data.savings.filter(s=>inRange(s.meeting_date||''));
  const totalSavingsIn = savingsInPeriod.reduce((a,b)=>a+Number(b.amount||0),0);
  const repayInPeriod = state.data.repayments.filter(r=>inRange(r.meeting_date||''));
  const totalPrincipalIn = repayInPeriod.reduce((a,b)=>a+Number(b.principal||0),0);
  const totalInterestIn = repayInPeriod.reduce((a,b)=>a+Number(b.interest||0),0);
  const totalRepayIn = repayInPeriod.reduce((a,b)=>a+Number(b.amount||0),0);

  // === FIX 4: Registration Fees ===
  const membersRegisteredInPeriod = state.data.members.filter(m=>inRange(m.registered_on||''));
  const totalRegFees = membersRegisteredInPeriod.reduce((a,m)=>a+Number(m.registration_fee||0),0);

  // === EXPENSES (Purchases) ===
  const purchasesInPeriod = state.data.purchases.filter(p=>inRange(p.received_on||''));
  const totalPurchasesOut = purchasesInPeriod.reduce((a,b)=>a+Number(b.total_cost||0),0);

  // === LOANS ISSUED ===
  const loansIssued = state.data.loans.filter(l=>inRange(l.start_date||''));
  const totalLoansOut = loansIssued.reduce((a,b)=>a+Number(b.loan_value||0),0);

  // === BALANCE SHEET SNAPSHOT ===
  const activeLoans = state.data.loans.filter(l=>l.status==='active');
  const totalOutstanding = activeLoans.reduce((a,l)=>a+(Number(l.total_payable||0)-loanPaid(l.id)),0);
  const totalSavingsBalance = state.data.members.reduce((a,m)=>a+memberSavings(m.id),0);
  const inventoryValue = state.data.inventory.reduce((a,i)=>a+Number(i.loan_price||0)*Number(i.stock||0),0);
  const inventoryCost = state.data.inventory.reduce((a,i)=>a+Number(i.buying_price||0)*Number(i.stock||0),0);

  // === RECONCILIATION STATUS ===
  const reconInPeriod = state.data.reconciliations.filter(r=>inRange(r.meeting_date||''));
  const reconConfirmed = reconInPeriod.filter(r=>r.status==='confirmed').reduce((a,b)=>a+Number(b.grand_total||0),0);
  const reconPending = reconInPeriod.filter(r=>r.status==='pending').reduce((a,b)=>a+Number(b.grand_total||0),0);

  // By-group savings breakdown
  const groupBreakdown = state.data.groups.map(g=>{
    const sv = savingsInPeriod.filter(s=>s.group_id===g.id).reduce((a,b)=>a+Number(b.amount||0),0);
    const rp = repayInPeriod.filter(r=>r.group_id===g.id).reduce((a,b)=>a+Number(b.amount||0),0);
    return { name:g.name, savings:sv, repayments:rp, total:sv+rp };
  }).filter(g=>g.total>0).sort((a,b)=>b.total-a.total);

  $('page').innerHTML = `
    <div class="page-head">
      <div><h1>Accounting</h1><div class="desc">Full money-flow view across savings, loans, purchases and reconciliations.</div></div>
      <div class="actions"><button class="btn btn-outline" onclick="exportAccountingReport()">Export to Excel</button></div>
    </div>

      ${_dashFilter==='custom'?`<input type="date" value="${_dashCustomStart}" style="padding:5px 8px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text)" onchange="_dashCustomStart=this.value;pageAccounting()" />
      <span class="muted" style="font-size:12px">to</span>
      <input type="date" value="${_dashCustomEnd}" style="padding:5px 8px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text)" onchange="_dashCustomEnd=this.value;pageAccounting()" />`:''}
    </div>

      <div class="kpi k-success"><div class="l">Savings collected</div><div class="v">${KES(totalSavingsIn)}</div><div class="d">${savingsInPeriod.length} entries</div></div>
      <div class="kpi k-primary"><div class="l">Loan repayments</div><div class="v">${KES(totalRepayIn)}</div><div class="d">Interest ${KES(totalInterestIn)}</div></div>
      <div class="kpi k-success"><div class="l">Registration fees</div><div class="v">${KES(totalRegFees)}</div><div class="d">${membersRegisteredInPeriod.length} new member${membersRegisteredInPeriod.length!==1?'s':''}</div></div>
      <div class="kpi k-warn"><div class="l">Loans issued (cash out)</div><div class="v">${KES(totalLoansOut)}</div><div class="d">${loansIssued.length} loans</div></div>
      <div class="kpi k-danger"><div class="l">Purchases (cash out)</div><div class="v">${KES(totalPurchasesOut)}</div><div class="d">${purchasesInPeriod.length} purchases</div></div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:16px">
      <div class="card card-pad">
        <h3 style="margin:0 0 14px">Period Income Statement</h3>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <tr><td style="padding:6px 0;color:var(--text-muted)">Savings received</td><td style="text-align:right;font-weight:600;color:var(--success)">${KES(totalSavingsIn)}</td></tr>
          <tr><td style="padding:6px 0;color:var(--text-muted)">Loan repayments (principal)</td><td style="text-align:right;font-weight:600;color:var(--success)">${KES(totalPrincipalIn)}</td></tr>
          <tr><td style="padding:6px 0;color:var(--text-muted)">Interest income</td><td style="text-align:right;font-weight:600;color:var(--success)">${KES(totalInterestIn)}</td></tr>
          <tr><td style="padding:6px 0;color:var(--text-muted)">Registration fees (${membersRegisteredInPeriod.length} members)</td><td style="text-align:right;font-weight:600;color:var(--success)">${KES(totalRegFees)}</td></tr>
          <tr><td style="padding:6px 0;border-top:2px solid var(--border);font-weight:700">Total inflows</td><td style="text-align:right;font-weight:700;color:var(--success);border-top:2px solid var(--border)">${KES(totalSavingsIn+totalRepayIn+totalRegFees)}</td></tr>
          <tr><td style="padding:6px 0;color:var(--text-muted)">Stock purchased</td><td style="text-align:right;font-weight:600;color:var(--danger)">−${KES(totalPurchasesOut)}</td></tr>
          <tr><td style="padding:6px 0;color:var(--text-muted)">Loans disbursed</td><td style="text-align:right;font-weight:600;color:var(--danger)">−${KES(totalLoansOut)}</td></tr>
          <tr><td style="padding:6px 0;border-top:2px solid var(--border);font-weight:700">Total outflows</td><td style="text-align:right;font-weight:700;color:var(--danger);border-top:2px solid var(--border)">−${KES(totalPurchasesOut+totalLoansOut)}</td></tr>
          <tr style="background:var(--surface-2)"><td style="padding:10px 6px;font-weight:800;font-size:14px;border-radius:var(--radius-sm) 0 0 var(--radius-sm)">Net cash movement</td><td style="text-align:right;font-weight:800;font-size:16px;padding:10px 6px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;color:${(totalSavingsIn+totalRepayIn-totalPurchasesOut-totalLoansOut)>=0?'var(--success)':'var(--danger)'}">${KES(totalSavingsIn+totalRepayIn+totalRegFees-totalPurchasesOut-totalLoansOut)}</td></tr>
        </table>
      </div>
      <div class="card card-pad">
        <h3 style="margin:0 0 14px">Balance Sheet Snapshot (All-time)</h3>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <tr><td style="padding:6px 0;color:var(--text-muted)">Total member savings (liability)</td><td style="text-align:right;font-weight:600;min-width:100px">${KES(totalSavingsBalance)}</td></tr>
          <tr><td style="padding:6px 0;color:var(--text-muted)">Loans outstanding (asset)</td><td style="text-align:right;font-weight:600">${KES(totalOutstanding)}</td></tr>
          <tr><td style="padding:6px 0;color:var(--text-muted)">Inventory at loan price</td><td style="text-align:right;font-weight:600">${KES(inventoryValue)}</td></tr>
          <tr><td style="padding:6px 0;color:var(--text-muted)">Inventory at cost</td><td style="text-align:right;font-weight:600">${KES(inventoryCost)}</td></tr>
          <tr><td style="padding:6px 0;border-top:2px solid var(--border);font-weight:700">Inventory margin</td><td style="text-align:right;font-weight:700;color:var(--success);border-top:2px solid var(--border)">${KES(inventoryValue-inventoryCost)}</td></tr>
          <tr><td style="padding:6px 0;color:var(--text-muted)">Paybill confirmed (period)</td><td style="text-align:right;font-weight:600;color:var(--success)">${KES(reconConfirmed)}</td></tr>
          <tr><td style="padding:6px 0;color:var(--text-muted)">Paybill pending confirmation</td><td style="text-align:right;font-weight:600;color:var(--warning)">${KES(reconPending)}</td></tr>
        </table>
      </div>
    </div>

    ${groupBreakdown.length ? `<div class="card">
      <div class="card-head"><h3>Collections by group (period)</h3></div>
      <div style="overflow-x:auto"><table class="tbl">
        <thead><tr><th>Group</th><th class="num">Savings</th><th class="num">Repayments</th><th class="num">Total collected</th></tr></thead>
        <tbody>${groupBreakdown.map(g=>`<tr>
          <td><b>${g.name}</b></td>
          <td class="num">${KES(g.savings)}</td>
          <td class="num">${KES(g.repayments)}</td>
          <td class="num"><b>${KES(g.total)}</b></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>` : ''}
  `;
}
function exportAccountingReport(){
  const { start, end } = dashDateRange();
  const inRange = date => date >= start && date <= end;
  const wb = XLSX.utils.book_new();
  // Savings
  const savRows = state.data.savings.filter(s=>inRange(s.meeting_date||'')).map(s=>{
    const m = state.data.members.find(x=>x.id===s.member_id), g=state.data.groups.find(x=>x.id===s.group_id);
    return {Date:s.meeting_date,Group:g?.name,Member:m?.full_name,Amount:Number(s.amount)};
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(savRows), 'Savings');
  // Repayments
  const repRows = state.data.repayments.filter(r=>inRange(r.meeting_date||'')).map(r=>{
    const m=state.data.members.find(x=>x.id===r.member_id);
    return {Date:r.meeting_date,Member:m?.full_name,Amount:Number(r.amount),Principal:Number(r.principal),Interest:Number(r.interest)};
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(repRows), 'Repayments');
  // Purchases
  const purRows = state.data.purchases.filter(p=>inRange(p.received_on||'')).map(p=>({
    Date:p.received_on,Supplier:p.supplier_name,Invoice:p.invoice_no,Total:Number(p.total_cost)
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(purRows), 'Purchases');
  // Loans
  const lnRows = state.data.loans.filter(l=>inRange(l.start_date||'')).map(l=>{
    const m=state.data.members.find(x=>x.id===l.member_id);
    return {Date:l.start_date,Member:m?.full_name,Asset:l.asset_name,LoanValue:Number(l.loan_value),Weekly:Number(l.weekly_installment)};
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lnRows), 'Loans issued');
  XLSX.writeFile(wb, `accounting_${start}_${end}.xlsx`);
  toast('Accounting report exported','success');
}
(async function boot(){
  applyTheme();
  // Restore session
  const { data } = await sb.auth.getSession();
  if(data.session){
    state.session = data.session;
    const ok = await loadStaff();
    if(!ok){ await sb.auth.signOut(); state.session=null; render(); return; }
    await loadSettings();
    await smartLoadAll();
    setupRealtime();
    flushQueue();
  }
  render();
  // Restore view position after a page refresh
  const restoreView = sessionStorage.getItem('pb_restore_view');
  const restoreCtx = sessionStorage.getItem('pb_restore_ctx');
  if(state.session && restoreView){
    sessionStorage.removeItem('pb_restore_view');
    sessionStorage.removeItem('pb_restore_ctx');
    state.view = restoreView;
    try { state.viewCtx = restoreCtx ? JSON.parse(restoreCtx) : null; } catch{ state.viewCtx = null; }
    render();
  }
  if(!navigator.onLine) setBanner('You are offline. Cached data shown. Changes will be queued.');
})();

</script>
